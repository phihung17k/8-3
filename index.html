<!doctype html>

<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Vũ Trụ của Em</title>
    <!-- Tailwind CSS v3 with Plugins -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <!-- Google Fonts: Playfair Display for cinematic text -->
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&amp;family=Inter:wght@300;400&amp;display=swap"
      rel="stylesheet"
    />
    <style data-purpose="global-typography">
      body {
        margin: 0;
        padding: 0;
        background-color: #020617; /* Slate 950 - Deep Space Blue */
        color: #f8fafc;
        font-family: "Inter", sans-serif;
        overflow: hidden;
      }
      .cinematic-text {
        font-family: "Playfair Display", serif;
      }
      .glow-gold {
        text-shadow:
          0 0 10px rgba(234, 179, 8, 0.5),
          0 0 20px rgba(234, 179, 8, 0.3);
      }
      .fade-overlay {
        background: radial-gradient(
          circle,
          transparent 0%,
          rgba(2, 6, 23, 1) 100%
        );
      }
    </style>
    <style data-purpose="animations">
      @keyframes fadeInOut {
        0% {
          opacity: 0;
          transform: translateY(10px);
        }
        20% {
          opacity: 1;
          transform: translateY(0);
        }
        80% {
          opacity: 1;
          transform: translateY(0);
        }
        100% {
          opacity: 0;
          transform: translateY(-10px);
        }
      }
      .animate-intro {
        animation: fadeInOut 5s ease-in-out forwards;
      }
      .hidden-state {
        display: none !important;
      }
      @keyframes pulse-star {
        0%,
        100% {
          transform: scale(1);
          opacity: 0.8;
        }
        50% {
          transform: scale(1.2);
          opacity: 1;
          filter: brightness(1.5);
        }
      }
      .star-pulse {
        animation: pulse-star 3s infinite ease-in-out;
      }
    </style>
  </head>
  <body class="relative w-full h-screen">
    <!-- BEGIN: Background Canvas Layer -->
    <div class="fixed inset-0 z-0 bg-[#020617]" data-purpose="background-layer">
      <canvas class="w-full h-full" id="galaxyCanvas"></canvas>
      <div class="absolute inset-0 fade-overlay pointer-events-none"></div>
    </div>
    <!-- END: Background Canvas Layer -->
    <!-- BEGIN: Audio Control -->
    <div class="fixed top-6 right-6 z-50">
      <button
        class="p-3 rounded-full border border-yellow-500/30 bg-black/20 backdrop-blur-md text-yellow-500 hover:bg-yellow-500/10 transition-all duration-300"
        id="soundToggle"
      >
        <svg
          class="h-6 w-6"
          fill="none"
          id="soundOnIcon"
          stroke="currentColor"
          viewbox="0 0 24 24"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
          ></path>
        </svg>
      </button>
    </div>
    <!-- END: Audio Control -->
    <!-- BEGIN: Scene 1 - Intro -->
    <div
      class="fixed inset-0 z-40 flex items-center justify-center bg-[#020617] transition-opacity duration-1000"
      id="introScene"
    >
      <div class="text-center px-4">
        <h1
          class="cinematic-text text-2xl md:text-4xl italic text-yellow-100/90 animate-intro"
        >
          Giữa hàng tỷ vì sao ngoài kia... <br class="md:hidden" />
          <span class="block mt-4">Anh vẫn tìm thấy em.</span>
        </h1>
      </div>
    </div>
    <!-- END: Scene 1 - Intro -->
    <!-- BEGIN: Scene 3 - Galaxy Interactive -->
    <main
      class="relative z-10 w-full h-full opacity-0 transition-opacity duration-2000 pointer-events-none"
      id="mainScene"
    >
      <!-- Star Progress Indicator -->
      <div class="absolute top-6 left-1/2 -translate-x-1/2 text-center">
        <p
          class="text-[10px] uppercase tracking-[0.3em] text-yellow-500/60 mb-1"
        >
          Khám phá tâm hồn em
        </p>
        <div class="w-48 h-[2px] bg-white/10 rounded-full overflow-hidden">
          <div
            class="h-full bg-yellow-500 transition-all duration-500"
            id="progressBar"
            style="width: 0%"
          ></div>
        </div>
      </div>
      <!-- Interaction Area -->
      <div
        class="relative w-full h-full pointer-events-auto"
        id="interactiveArea"
      >
        <!-- Stars will be injected here by JS -->
      </div>
    </main>
    <!-- END: Scene 3 - Galaxy Interactive -->
    <!-- BEGIN: Popup Modal -->
    <div
      class="fixed inset-0 z-50 flex items-center justify-center pointer-events-none opacity-0 transition-all duration-500 bg-black/40 backdrop-blur-[2px]"
      id="reasonModal"
    >
      <div
        class="bg-slate-900/80 border border-yellow-500/20 p-8 rounded-2xl max-w-md w-[90%] text-center shadow-2xl relative"
      >
        <div
          class="absolute -top-12 left-1/2 -translate-x-1/2 text-yellow-400 text-4xl"
        >
          ✧
        </div>
        <p
          class="cinematic-text text-xl md:text-2xl text-yellow-100 italic leading-relaxed"
          id="reasonText"
        ></p>
        <button
          class="mt-8 px-6 py-2 border border-yellow-500/30 text-yellow-500/80 hover:text-yellow-400 hover:border-yellow-500 rounded-full text-xs tracking-widest uppercase transition-all pointer-events-auto"
          id="closeModal"
        >
          Tiếp tục hành trình
        </button>
      </div>
    </div>
    <!-- END: Popup Modal -->
    <!-- BEGIN: Final Climax Scene -->
    <div
      class="fixed inset-0 z-[60] flex flex-col items-center justify-center bg-black/60 backdrop-blur-md opacity-0 pointer-events-none transition-opacity duration-[3000ms]"
      id="finalScene"
    >
      <div class="relative w-64 h-64 mb-8" id="heartContainer">
        <!-- Heart shape formed by CSS/JS stars -->
      </div>
      <div class="text-center px-6">
        <h2
          class="cinematic-text text-4xl md:text-6xl text-yellow-400 glow-gold mb-4"
        >
          Vũ Trụ Của Anh
        </h2>
        <p
          class="text-yellow-100/80 max-w-md mx-auto italic text-lg leading-relaxed"
        >
          Cảm ơn em đã xuất hiện, để thế giới của anh không còn là những khoảng
          không vô định. Em chính là vì sao sáng nhất, đẹp nhất và duy nhất mà
          anh mãi mãi theo đuổi.
        </p>
        <p class="mt-8 cinematic-text text-2xl text-yellow-500">Anh Yêu Em.</p>
      </div>
    </div>
    <!-- END: Final Climax Scene -->
    <!-- SCRIPTS -->
    <script data-purpose="reasons-data">
      const REASONS = [
        "Cách em cười làm cả thế giới của anh bừng sáng.",
        "Sự dịu dàng của em xoa dịu mọi bão giông trong anh.",
        "Em luôn tin tưởng anh ngay cả khi anh nghi ngờ chính mình.",
        "Cách em chăm sóc những điều nhỏ nhặt nhất.",
        "Ánh mắt em chứa đựng cả một bầu trời bình yên.",
        "Em là người duy nhất hiểu được những suy nghĩ chưa nói của anh.",
        "Sự thông minh và bản lĩnh của em khiến anh ngưỡng mộ.",
        "Cách em gọi tên anh một cách ngọt ngào.",
        "Em làm cho những ngày bình thường trở nên đặc biệt.",
        "Tấm lòng nhân hậu của em đối với mọi người xung quanh.",
        "Vẻ đẹp tự nhiên của em mỗi sớm mai thức dậy.",
        "Cách em kiên nhẫn lắng nghe mọi tâm sự của anh.",
        "Sự đồng điệu kỳ lạ trong tâm hồn chúng ta.",
        "Em là động lực để anh trở thành phiên bản tốt hơn.",
        "Cách em nắm tay anh thật chặt giữa đám đông.",
        "Sự lạc quan của em luôn truyền năng lượng tích cực cho anh.",
        "Vì em luôn trân trọng những kỷ niệm của hai đứa.",
        "Cách em lo lắng cho sức khỏe của anh.",
        "Em là mảnh ghép hoàn hảo còn thiếu trong cuộc đời anh.",
        "Những tin nhắn chúc ngủ ngon mỗi tối của em.",
        "Cách em ủng hộ những đam mê điên rồ của anh.",
        "Vì em luôn biết cách làm anh mỉm cười khi anh buồn.",
        "Sự tinh tế của em trong từng hành động nhỏ.",
        "Cách em bảo vệ tình yêu của chúng ta.",
        "Em là người đầu tiên anh muốn chia sẻ mọi niềm vui.",
        "Vì em đã chọn đi cùng anh trên con đường này.",
        "Sự chân thành không bao giờ thay đổi của em.",
        "Cách em nhìn thế giới đầy sự tò mò và yêu thương.",
        "Vì ở bên em, anh được là chính mình nhất.",
        "Đơn giản vì em là chính em - duy nhất và vô giá.",
      ];
    </script>
    <script data-purpose="canvas-background">
      const canvas = document.getElementById("galaxyCanvas");
      const ctx = canvas.getContext("2d");
      let width, height;
      let stars = [];
      let shootingStars = [];

      function initCanvas() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;

        stars = [];
        for (let i = 0; i < 400; i++) {
          stars.push({
            x: Math.random() * width,
            y: Math.random() * height,
            size: Math.random() * 1.5,
            opacity: Math.random(),
            speed: Math.random() * 0.05 + 0.01,
            layer: Math.floor(Math.random() * 3) + 1,
          });
        }
      }

      function draw() {
        ctx.clearRect(0, 0, width, height);

        // Draw static/parallax background stars
        stars.forEach((star) => {
          ctx.beginPath();
          ctx.fillStyle = `rgba(255, 255, 255, ${star.opacity})`;
          ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
          ctx.fill();

          // Subtle drift
          star.y -= star.speed;
          if (star.y < 0) star.y = height;

          // Twinkle
          star.opacity += (Math.random() - 0.5) * 0.02;
          if (star.opacity < 0.1) star.opacity = 0.1;
          if (star.opacity > 0.8) star.opacity = 0.8;
        });

        // Handle shooting stars
        if (Math.random() < 0.01) {
          shootingStars.push({
            x: Math.random() * width,
            y: (Math.random() * height) / 2,
            len: Math.random() * 80 + 20,
            speed: Math.random() * 10 + 5,
            opacity: 1,
          });
        }

        shootingStars.forEach((s, i) => {
          ctx.beginPath();
          ctx.strokeStyle = `rgba(234, 179, 8, ${s.opacity})`;
          ctx.lineWidth = 1;
          ctx.moveTo(s.x, s.y);
          ctx.lineTo(s.x + s.len, s.y + s.len / 2);
          ctx.stroke();

          s.x += s.speed;
          s.y += s.speed / 2;
          s.opacity -= 0.01;

          if (s.opacity <= 0) shootingStars.splice(i, 1);
        });

        requestAnimationFrame(draw);
      }

      window.addEventListener("resize", initCanvas);
      initCanvas();
      draw();
    </script>
    <script data-purpose="interaction-logic">
      const introScene = document.getElementById("introScene");
      const mainScene = document.getElementById("mainScene");
      const interactiveArea = document.getElementById("interactiveArea");
      const progressBar = document.getElementById("progressBar");
      const reasonModal = document.getElementById("reasonModal");
      const reasonText = document.getElementById("reasonText");
      const closeModal = document.getElementById("closeModal");
      const finalScene = document.getElementById("finalScene");
      const heartContainer = document.getElementById("heartContainer");

      let viewedCount = 0;
      const TOTAL_STARS = 30;
      const viewedIndices = new Set();

      // Start Sequence
      setTimeout(() => {
        introScene.style.opacity = "0";
        setTimeout(() => {
          introScene.classList.add("hidden-state");
          mainScene.classList.remove("opacity-0");
          mainScene.classList.add("opacity-100");
          mainScene.style.pointerEvents = "auto";
          createInteractiveStars();
        }, 1000);
      }, 5500);

      function createInteractiveStars() {
        for (let i = 0; i < TOTAL_STARS; i++) {
          const star = document.createElement("div");
          star.className = "absolute cursor-pointer star-pulse group";

          // Random position within 80% of screen to avoid edges
          const x = 10 + Math.random() * 80;
          const y = 15 + Math.random() * 70;

          star.style.left = `${x}%`;
          star.style.top = `${y}%`;
          star.innerHTML = `
          <div class="relative w-4 h-4 flex items-center justify-center">
            <div class="absolute w-1 h-1 bg-yellow-400 rounded-full shadow-[0_0_8px_#fbbf24]"></div>
            <div class="absolute inset-0 border border-yellow-500/0 group-hover:border-yellow-500/40 rounded-full scale-150 transition-all duration-500"></div>
          </div>
        `;

          star.addEventListener("click", () => showReason(i, star));
          interactiveArea.appendChild(star);
        }
      }

      function showReason(index, element) {
        if (!viewedIndices.has(index)) {
          viewedIndices.add(index);
          viewedCount++;
          updateProgress();
          element
            .querySelector(".bg-yellow-400")
            .classList.remove("bg-yellow-400");
          element.querySelector(".bg-yellow-400")?.classList.add("bg-white/40"); // Dim viewed stars
        }

        reasonModal.classList.remove("opacity-0", "pointer-events-none");
        reasonText.innerHTML = "";
        typeWriter(REASONS[index], 0);

        if (viewedCount >= TOTAL_STARS * 0.7) {
          // Trigger pre-climax visual hints or logic if needed
        }
      }

      function typeWriter(text, i) {
        if (i < text.length) {
          reasonText.innerHTML += text.charAt(i);
          setTimeout(() => typeWriter(text, i + 1), 40);
        }
      }

      function updateProgress() {
        const percent = (viewedCount / TOTAL_STARS) * 100;
        progressBar.style.width = `${percent}%`;

        if (viewedCount >= 21) {
          // 70% of 30
          triggerClimax();
        }
      }

      function triggerClimax() {
        setTimeout(() => {
          finalScene.classList.remove("opacity-0", "pointer-events-none");
          finalScene.classList.add("opacity-100");
          createHeart();
        }, 1500);
      }

      function createHeart() {
        const points = [];
        for (let t = 0; t < Math.PI * 2; t += 0.15) {
          const x = 16 * Math.pow(Math.sin(t), 3);
          const y = -(
            13 * Math.cos(t) -
            5 * Math.cos(2 * t) -
            2 * Math.cos(3 * t) -
            Math.cos(4 * t)
          );
          points.push({ x: x * 8 + 128, y: y * 8 + 128 });
        }

        points.forEach((p, i) => {
          const s = document.createElement("div");
          s.className =
            "absolute w-1 h-1 bg-yellow-400 rounded-full shadow-[0_0_10px_#fbbf24]";
          s.style.left = `${p.x}px`;
          s.style.top = `${p.y}px`;
          s.style.opacity = "0";
          s.style.transition = `all 2s ease-in-out ${i * 0.05}s`;
          heartContainer.appendChild(s);
          setTimeout(() => (s.style.opacity = "1"), 100);
        });
      }

      closeModal.addEventListener("click", () => {
        reasonModal.classList.add("opacity-0", "pointer-events-none");
      });

      // Sound toggle placeholder logic
      let isMuted = true;
      const soundToggle = document.getElementById("soundToggle");
      soundToggle.addEventListener("click", () => {
        isMuted = !isMuted;
        soundToggle.classList.toggle("bg-yellow-500/20", !isMuted);
        // In a real scenario, you'd trigger Audio object play/pause here
      });
    </script>
  </body>
</html>
